<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern DOM Manipulation</title>
    <style>
        /* Modern CSS Reset & Styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc, #cfdef3);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Glassmorphism Card Design */
        .card {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h1 {
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 15px;
            transition: color 0.3s ease;
        }

        p {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        /* Styled Action Button */
        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(52, 152, 219, 0.3);
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #2980b9;
            box-shadow: 0 6px 20px rgba(41, 128, 185, 0.4);
            transform: scale(1.03);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Utility class applied via JS after click */
        .success-text {
            color: #2ecc71 !important;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="dynamicHeading">Original Heading Text</h1>
        <p>Click the button below to trigger a JavaScript DOM update that changes the content and style dynamically.</p>
        
        <button id="actionBtn" class="btn">Update Content</button>
    </div>

    <script>
        // Select elements from the DOM
        const heading = document.getElementById('dynamicHeading');
        const button = document.getElementById('actionBtn');

        // Add event listener for interaction
        button.addEventListener('click', () => {
            // 1. Change the text content
            heading.textContent = 'Text Updated Successfully!';
            
            // 2. Dynamically add a CSS class to shift color
            heading.classList.add('success-text');
            
            // 3. Update button appearance to reflect the change
            button.textContent = 'Done!';
            button.style.background = '#2ecc71';
            button.style.boxShadow = '0 4px 15px rgba(46, 204, 113, 0.3)';
        });
    </script>

</body>
</html>
